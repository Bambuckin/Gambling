services:
  lottery-postgres:
    image: postgres:16-alpine
    container_name: lottery-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lottery
      POSTGRES_USER: lottery
      POSTGRES_PASSWORD: lottery
    ports:
      - "5432:5432"
    volumes:
      - lottery-postgres-data:/var/lib/postgresql/data

volumes:
  lottery-postgres-data:
